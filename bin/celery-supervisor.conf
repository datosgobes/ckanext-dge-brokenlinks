; ===============================
; ckan celeryd supervisor example
; ===============================

; symlink or copy this file to /etc/supervisr/conf.d 
; change the path/to/virtualenv below to the virtualenv ckan is in.


[program:celery-priority]
; Full Path to executable, should be path to virtural environment,
; Full path to config file too.

command=ckan -c /etc/ckan/ckan.ini dge_brokenlinks_celery run --queue priority -l debug -c 1

; user that owns virtual environment.
user=ckan

numprocs=1
stdout_logfile=/var/log/ckan/celery-priority.log
stderr_logfile=/var/log/ckan/celery-priority.log
autostart=true
autorestart=true
startsecs=10

; Need to wait for currently executing tasks to finish at shutdown.
; Increase this if you have very long running tasks.
stopwaitsecs = 600

; if rabbitmq is supervised, set its priority higher
; so it starts first
priority=998

